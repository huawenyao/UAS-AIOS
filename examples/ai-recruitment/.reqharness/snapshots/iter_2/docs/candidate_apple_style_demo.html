<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>评估报告 · 张三</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", sans-serif;
      margin: 0;
      padding: 0;
      background: #fbfbfd;
      color: #1d1d1f;
      font-size: 17px;
      line-height: 1.47059;
      font-weight: 400;
      letter-spacing: -0.022em;
    }
    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 48px 28px 80px;
    }
    .hero {
      text-align: center;
      padding: 56px 0 48px;
      border-bottom: 1px solid rgba(0,0,0,.08);
    }
    .hero h1 {
      font-size: 40px;
      font-weight: 600;
      letter-spacing: -0.025em;
      margin: 0 0 8px;
      color: #1d1d1f;
    }
    .hero .meta {
      font-size: 15px;
      color: #6e6e73;
    }
    .hero .meta-name {
      color: #1d1d1f;
      font-weight: 500;
    }
    .block {
      background: #fff;
      border-radius: 18px;
      padding: 32px 36px;
      margin-top: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .block:first-of-type {
      margin-top: 32px;
    }
    .section-title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0 0 20px;
      color: #1d1d1f;
    }
    .section-desc {
      font-size: 15px;
      color: #6e6e73;
      margin: 0 0 16px;
      line-height: 1.5;
    }
    .score-card {
      display: grid;
      gap: 0;
      background: #fff;
      border-radius: 18px;
      padding: 28px 36px;
      margin-top: 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid rgba(0,0,0,.06);
      font-size: 16px;
    }
    .score-row:last-child {
      border-bottom: none;
    }
    .score-row-total {
      padding-top: 20px;
      margin-top: 8px;
      border-top: 2px solid rgba(0,0,0,.1);
      font-size: 18px;
      font-weight: 600;
    }
    .score-label {
      color: #6e6e73;
    }
    .score-value {
      font-variant-numeric: tabular-nums;
      font-weight: 500;
      color: #1d1d1f;
    }
    .decision-badge {
      display: inline-block;
      padding: 10px 24px;
      border-radius: 980px;
      font-size: 17px;
      font-weight: 600;
      background: var(--badge-color);
      color: #fff;
    }
    .list {
      margin: 0;
      padding-left: 22px;
      color: #1d1d1f;
      line-height: 1.6;
    }
    .list li {
      margin-bottom: 8px;
    }
    .list-ordered { list-style: decimal; }
    .footer {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid rgba(0,0,0,.08);
      font-size: 13px;
      color: #86868b;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="hero">
      <h1>评估报告</h1>
      <p class="meta"><span class="meta-name">张三</span> · job-1 · cand_test · 2026-03-15 16:57</p>
    </header>

    <section class="score-card">
      <h2 class="section-title">匹配得分</h2>
      <div class="score-row"><span class="score-label">学历匹配</span><span class="score-value">8</span></div>
      <div class="score-row"><span class="score-label">经验匹配</span><span class="score-value">7.5</span></div>
      <div class="score-row"><span class="score-label">技能匹配</span><span class="score-value">9</span></div>
      <div class="score-row score-row-total"><span class="score-label">综合得分</span><span class="score-value">8.2</span></div>
    </section>

    <section class="block">
      <h2 class="section-title">推荐结论</h2>
      <div class="decision-badge" style="--badge-color:#0071e3">推荐</div>
    </section>

    <section class="block">
      <h2 class="section-title">风险标识</h2>
      <ul class="list"><li>工作经验不足</li></ul>
    </section>

    <section class="block">
      <h2 class="section-title">证据链</h2>
      <p class="section-desc">各维度得分与推荐结论的依据，便于审计与反馈。</p>
      <ol class="list list-ordered"><li>学历符合要求</li><li>经验接近要求</li><li>技能匹配度高</li></ol>
    </section>

    <footer class="footer">
      本报告由 ASUI 架构生成，可审计追溯。
    </footer>
  </div>
</body>
</html>
