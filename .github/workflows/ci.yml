name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          cd asui-cli && pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check --select E,F,W --ignore E402,E741 .

      - name: Test ASUI CLI
        run: cd asui-cli && python -m pytest tests/ -v

      - name: Test World Model
        run: python -m pytest uas_world_model/tests/test_core.py -v -k "not TestLatentPlanning and not TestKnowledgeEvolution and not test_constraint_extraction and not test_priority_calculation"
