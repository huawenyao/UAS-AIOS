<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Janus World Model Visualization</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #07070a;
      color: #e4e4e7;
      font-family: "DM Sans", system-ui, sans-serif;
      overflow: hidden;
    }
    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }
    .overlay {
      position: relative;
      z-index: 1;
      padding: 2rem;
      text-align: center;
    }
    h1 {
      font-family: "Syne", sans-serif;
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 1rem;
    }
    .accent {
      color: #22d3ee;
      text-shadow: 0 0 40px rgba(34, 211, 238, 0.3);
    }
    p {
      color: #a1a1aa;
      max-width: 60ch;
      margin: 0 auto 2rem;
      line-height: 1.6;
    }
    .controls {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 2rem;
    }
    button {
      background: rgba(34, 211, 238, 0.12);
      color: #22d3ee;
      border: 1px solid rgba(34, 211, 238, 0.2);
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      font-family: "DM Sans", sans-serif;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    button:hover {
      background: rgba(34, 211, 238, 0.2);
      border-color: rgba(34, 211, 238, 0.35);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="overlay">
    <h1>Janus <span class="accent">World Model</span></h1>
    <p>
      双面结构：表征面（RepresentationalFace）与反表征面（EnactiveFace）的动态耦合。
      法则（Law）的活化、凝结、蒸发与凝华形成认知循环。
    </p>
    <div class="controls">
      <button id="toggleFaces">切换双面</button>
      <button id="activateLaw">激活法则</button>
      <button id="crystallize">触发凝结</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    // 颜色定义
    const colors = {
      representational: '#22d3ee', // 表征面：霓虹青
      enactive: '#818cf8',         // 反表征面：靛蓝
      law: '#f472b6',              // 法则：粉红
      experience: '#34d399',       // 经验：绿色
      phase: '#fbbf24'             // 相变：金色
    };

    // Janus 双环面参数
    const torus = {
      R: 150, // 大半径
      r: 60,  // 小半径
      segments: 100,
      tubeSegments: 30,
      rotation: 0,
      face: 'both' // 'representational', 'enactive', 'both'
    };

    // 法则粒子系统
    const laws = [];
    const experiences = [];
    const phaseParticles = [];

    class LawParticle {
      constructor() {
        this.angle = Math.random() * Math.PI * 2;
        this.tubeAngle = Math.random() * Math.PI * 2;
        this.speed = 0.005 + Math.random() * 0.01;
        this.size = 3 + Math.random() * 2;
        this.opacity = 0.5 + Math.random() * 0.5;
        this.color = colors.law;
        this.activated = false;
        this.activationTime = 0;
      }

      update() {
        this.angle += this.speed;
        this.tubeAngle += this.speed * 0.3;
        
        if (this.activated) {
          this.activationTime += 0.016;
          if (this.activationTime > 2) {
            this.activated = false;
            this.activationTime = 0;
          }
        }
      }

      getPosition() {
        const x = (torus.R + torus.r * Math.cos(this.tubeAngle)) * Math.cos(this.angle);
        const y = (torus.R + torus.r * Math.cos(this.tubeAngle)) * Math.sin(this.angle);
        const z = torus.r * Math.sin(this.tubeAngle);
        return { x, y, z };
      }

      draw() {
        const pos = this.getPosition();
        const scale = 400 / (400 + pos.z);
        const x2d = pos.x * scale + width / 2;
        const y2d = pos.y * scale + height / 2;
        
        let alpha = this.opacity * scale;
        let size = this.size * scale;
        
        if (this.activated) {
          const pulse = Math.sin(this.activationTime * 5) * 0.5 + 0.5;
          alpha *= 1 + pulse * 0.5;
          size *= 1 + pulse * 0.3;
          ctx.shadowBlur = 20;
          ctx.shadowColor = this.color;
        } else {
          ctx.shadowBlur = 0;
        }
        
        ctx.beginPath();
        ctx.arc(x2d, y2d, size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.globalAlpha = alpha;
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
      }
    }

    // 初始化法则粒子
    for (let i = 0; i < 50; i++) {
      laws.push(new LawParticle());
    }

    // 经验粒子（从反表征面产生）
    class ExperienceParticle {
      constructor() {
        this.angle = Math.random() * Math.PI * 2;
        this.tubeAngle = Math.random() * Math.PI * 2;
        this.speed = 0.003 + Math.random() * 0.008;
        this.size = 2 + Math.random() * 1.5;
        this.opacity = 0.3 + Math.random() * 0.4;
        this.color = colors.experience;
        this.coupling = 0; // 耦合度
      }

      update() {
        this.angle += this.speed;
        this.tubeAngle += this.speed * 0.2;
        this.coupling = Math.sin(Date.now() * 0.001) * 0.5 + 0.5;
      }

      getPosition() {
        const x = (torus.R + torus.r * Math.cos(this.tubeAngle)) * Math.cos(this.angle);
        const y = (torus.R + torus.r * Math.cos(this.tubeAngle)) * Math.sin(this.angle);
        const z = torus.r * Math.sin(this.tubeAngle);
        return { x, y, z };
      }

      draw() {
        const pos = this.getPosition();
        const scale = 400 / (400 + pos.z);
        const x2d = pos.x * scale + width / 2;
        const y2d = pos.y * scale + height / 2;
        
        const alpha = this.opacity * scale * (0.5 + this.coupling * 0.5);
        const size = this.size * scale;
        
        ctx.beginPath();
        ctx.arc(x2d, y2d, size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.globalAlpha = alpha;
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    // 初始化经验粒子
    for (let i = 0; i < 30; i++) {
      experiences.push(new ExperienceParticle());
    }

    // 相变粒子
    class PhaseParticle {
      constructor(type) {
        this.type = type; // 'condensation', 'activation', 'evaporation', 'sublimation'
        this.x = width / 2 + (Math.random() - 0.5) * 200;
        this.y = height / 2 + (Math.random() - 0.5) * 200;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2;
        this.life = 1;
        this.decay = 0.01 + Math.random() * 0.02;
        this.size = 4 + Math.random() * 3;
        this.color = colors.phase;
        this.angle = Math.random() * Math.PI * 2;
        this.rotationSpeed = (Math.random() - 0.5) * 0.1;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
        this.angle += this.rotationSpeed;
        
        // 根据相变类型调整行为
        if (this.type === 'condensation') {
          // 凝结：向中心聚集
          this.vx += (width/2 - this.x) * 0.0001;
          this.vy += (height/2 - this.y) * 0.0001;
        } else if (this.type === 'evaporation') {
          // 蒸发：向外扩散
          this.vx += (this.x - width/2) * 0.00005;
          this.vy += (this.y - height/2) * 0.00005;
        }
        
        return this.life > 0;
      }

      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        
        ctx.beginPath();
        if (this.type === 'condensation' || this.type === 'sublimation') {
          // 凝结/凝华：星形
          for (let i = 0; i < 5; i++) {
            const angle = (i * 4 * Math.PI) / 5;
            const x = Math.cos(angle) * this.size;
            const y = Math.sin(angle) * this.size;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.closePath();
        } else {
          // 活化/蒸发：圆形
          ctx.arc(0, 0, this.size, 0, Math.PI * 2);
        }
        
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.life * 0.7;
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.restore();
      }
    }

    // 绘制双环面结构
    function drawTorus() {
      const centerX = width / 2;
      const centerY = height / 2;
      
      // 表征面（外环）
      if (torus.face === 'representational' || torus.face === 'both') {
        ctx.beginPath();
        ctx.arc(centerX, centerY, torus.R + torus.r, 0, Math.PI * 2);
        ctx.strokeStyle = colors.representational;
        ctx.lineWidth = 2;
        ctx.globalAlpha = 0.3;
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
      
      // 反表征面（内环）
      if (torus.face === 'enactive' || torus.face === 'both') {
        ctx.beginPath();
        ctx.arc(centerX, centerY, torus.R - torus.r, 0, Math.PI * 2);
        ctx.strokeStyle = colors.enactive;
        ctx.lineWidth = 2;
        ctx.globalAlpha = 0.3;
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
      
      // 连接线（耦合）
      if (torus.face === 'both') {
        for (let i = 0; i < 8; i++) {
          const angle = (i * Math.PI * 2) / 8 + torus.rotation;
          const x1 = centerX + (torus.R - torus.r) * Math.cos(angle);
          const y1 = centerY + (torus.R - torus.r) * Math.sin(angle);
          const x2 = centerX + (torus.R + torus.r) * Math.cos(angle);
          const y2 = centerY + (torus.R + torus.r) * Math.sin(angle);
          
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.strokeStyle = `rgba(34, 211, 238, 0.1)`;
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      }
    }

    // 绘制中心核心（认知引擎）
    function drawCore() {
      const centerX = width / 2;
      const centerY = height / 2;
      const time = Date.now() * 0.001;
      
      // 核心光晕
      const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 80);
      gradient.addColorStop(0, 'rgba(34, 211, 238, 0.3)');
      gradient.addColorStop(0.5, 'rgba(34, 211, 238, 0.1)');
      gradient.addColorStop(1, 'rgba(34, 211, 238, 0)');
      
      ctx.beginPath();
      ctx.arc(centerX, centerY, 80, 0, Math.PI * 2);
      ctx.fillStyle = gradient;
      ctx.fill();
      
      // 核心脉冲
      const pulse = Math.sin(time * 2) * 0.5 + 0.5;
      ctx.beginPath();
      ctx.arc(centerX, centerY, 20 + pulse * 10, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(34, 211, 238, ${0.2 + pulse * 0.3})`;
      ctx.fill();
      
      // 核心文字
      ctx.font = '12px "JetBrains Mono", monospace';
      ctx.fillStyle = '#22d3ee';
      ctx.textAlign = 'center';
      ctx.textBaseline = middle;
      ctx.fillText('COGNITIVE ENGINE', centerX, centerY);
    }

    // 动画循环
    function animate() {
      ctx.clearRect(0, 0, width, height);
      
      // 更新旋转
      torus.rotation += 0.005;
      
      // 绘制背景网格
      drawGrid();
      
      // 绘制双环面
      drawTorus();
      
      // 更新并绘制法则粒子
      laws.forEach(law => {
        law.update();
        law.draw();
      });
      
      // 更新并绘制经验粒子
      experiences.forEach(exp => {
        exp.update();
        exp.draw();
      });
      
      // 更新并绘制相变粒子
      for (let i = phaseParticles.length - 1; i >= 0; i--) {
        if (!phaseParticles[i].update()) {
          phaseParticles.splice(i, 1);
        } else {
          phaseParticles[i].draw();
        }
      }
      
      // 绘制中心核心
      drawCore();
      
      requestAnimationFrame(animate);
    }

    // 绘制背景网格
    function drawGrid() {
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
      ctx.lineWidth = 1;
      
      const gridSize = 60;
      for (let x = 0; x < width; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, height);
        ctx.stroke();
      }
      
      for (let y = 0; y < height; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(width, y);
        ctx.stroke();
      }
    }

    // 控制函数
    document.getElementById('toggleFaces').addEventListener('click', () => {
      if (torus.face === 'both') {
        torus.face = 'representational';
      } else if (torus.face === 'representational') {
        torus.face = 'enactive';
      } else {
        torus.face = 'both';
      }
    });

    document.getElementById('activateLaw').addEventListener('click', () => {
      // 随机激活一些法则粒子
      const count = 5 + Math.floor(Math.random() * 10);
      for (let i = 0; i < count; i++) {
        const index = Math.floor(Math.random() * laws.length);
        laws[index].activated = true;
      }
      
      // 生成经验粒子
      for (let i = 0; i < 3; i++) {
        experiences.push(new ExperienceParticle());
      }
    });

    document.getElementById('crystallize').addEventListener('click', () => {
      // 触发凝结相变
      for (let i = 0; i < 20; i++) {
        phaseParticles.push(new PhaseParticle('condensation'));
      }
      
      // 凝结产生新的法则粒子
      setTimeout(() => {
        for (let i = 0; i < 5; i++) {
          laws.push(new LawParticle());
        }
      }, 1000);
    });

    // 鼠标交互
    canvas.addEventListener('mousemove', (e) => {
      const mouseX = e.clientX;
      const mouseY = e.clientY;
      
      // 吸引附近的粒子
      laws.forEach(law => {
        const pos = law.getPosition();
        const scale = 400 / (400 + pos.z);
        const x2d = pos.x * scale + width / 2;
        const y2d = pos.y * scale + height / 2;
        
        const dx = mouseX - x2d;
        const dy = mouseY - y2d;
        const distance = Math.sqrt(dx * dx + dy * dy);
        
        if (distance < 100) {
          law.angle += dx * 0.0001;
          law.tubeAngle += dy * 0.0001;
        }
      });
    });

    // 窗口大小调整
    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });

    // 开始动画
    animate();
  </script>
</body>
</html>
